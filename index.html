<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ホテルグランビュー福岡 Shuttle Bus</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="container">

    <header class="header">

      <h1>ホテルグランビュー福岡</h1>

      <h2>送客バス　国内線まで</h2>

      <p>
        Shuttle Bus to Domestic Terminal
      </p>

    </header>

    <section class="date-section">

      <label>
        ご利用日
      </label>

      <input type="date" id="busDate">

    </section>

    <div class="schedule-layout">

      <section class="schedule-box">

        <div class="schedule-title">
          6:00 - 7:00
        </div>

        <div class="schedule-subtitle">
          最大15名（8名車優先）
        </div>

        <div id="earlySlots" class="slots-grid"></div>

      </section>

      <section class="schedule-box">

        <div class="schedule-title">
          7:30 - 10:00
        </div>

        <div class="schedule-subtitle">
          最大7名
        </div>

        <div id="regularSlots" class="slots-grid"></div>

      </section>

    </div>

    <section class="manage-section">

      <button id="manageBookingBtn">
        予約確認・変更・キャンセル
      </button>

    </section>

  </div>

  <!-- BOOKING POPUP -->

  <div id="popup" class="popup hidden">

    <div class="popup-card">

      <div class="popup-header">
        <span id="selectedTime">06:05</span>
      </div>

<form id="bookingForm">

  <!-- ROW 1 -->

  <div class="form-row">

    <div class="form-group">

      <label>
        お名前
      </label>

      <div class="sub-note">
        カタカナ
      </div>

      <input
        type="text"
        placeholder="Name"
        required
      >

    </div>

    <div class="form-group small-group">

      <label>
        部屋番号
      </label>

      <div class="sub-note">
        ご宿泊中のお客様
      </div>

      <input
        type="text"
        placeholder="Room"
      >

    </div>

    <div class="form-group">

      <label>
        チェックイン
      </label>
      <div class="sub-note">
        ひ
      </div>


      <input
        type="date"
        required
      >

    </div>

  </div>

  <!-- ROW 2 -->

  <div class="form-row">

    <div class="form-group">

      <label>
        電話番号
      </label>

      <input
        type="text"
        placeholder="Phone Number"
        required
      >

    </div>

  </div>

  <!-- PASSENGER -->

  <div class="group-title">
    ご利用人数
  </div>

  <div class="compact-row">

    <div class="compact-item">

      <span>大人</span>

      <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
      </select>

    </div>

    <div class="compact-item">

      <span>座席あり</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

    <div class="compact-item">

      <span>膝上</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

  </div>

  <!-- LUGGAGE -->

  <div class="group-title">
    荷物
  </div>

  <div class="compact-row">

    <div class="compact-item">

      <span>大型</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>

    </div>

    <div class="compact-item">

      <span>機内持込</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>

    </div>

    <div class="compact-item">

      <span>ベビーカー</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

  </div>

  <!-- BUTTON -->

  <div class="button-row">

    <button
      type="submit"
      class="action-btn"
    >
      Confirm
    </button>

    <button
      type="button"
      id="closePopup"
      class="action-btn"
    >
      Close
    </button>

  </div>

</form>
  </div>

  </div>

  <!-- MANAGE POPUP -->

  <div id="managePopup" class="popup hidden">

    <div class="popup-card small-popup">

      <div class="popup-header">
        Reservation Lookup
      </div>

      <form id="manageForm">

        <label>お名前</label>
        <input type="text" required>

        <label>電話番号</label>
        <input type="text" required>

        <label>チェックイン日</label>
        <input type="date" required>

        <button type="submit" class="confirm-btn">
          Search Reservation
        </button>

        <button type="button" id="closeManagePopup" class="close-btn">
          Close
        </button>

      </form>

    </div>

  </div>

  <script src="./app.js"></script>

</body>
</html>
