<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ホテルグランビュー福岡 Shuttle Bus</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="container">

    <header class="header">

     <img src="https://granview.co.jp/fukuokaap/fukuoka_airport.svg"　style = "size 90%">
<div class="schedule-subtitle">
         ホテルグランビュー福岡空港｜福岡・博多
        </div>

      <h2>送客バス　国内線まで</h2>

      <p>
        Shuttle Bus to Domestic Terminal
      </p>

    </header>

    <section class="date-section">

      <label>
        ご利用日
      </label>

      <input type="date" id="busDate">

    </section>

    <div class="schedule-layout">

      <section class="schedule-box">

        <div class="schedule-title">
          6:00 - 7:00
        </div>

        <div class="schedule-subtitle">
          最大8名（満席時は7名車）
        </div>

        <div id="earlySlots" class="slots-grid"></div>

      </section>

      <section class="schedule-box">

        <div class="schedule-title">
          7:30 - 10:00
        </div>

        <div class="schedule-subtitle">
          最大7名
        </div>

        <div id="regularSlots" class="slots-grid"></div>

      </section>

    </div>

    <section class="manage-section">

      <button id="manageBookingBtn">
        予約確認・変更・キャンセル
      </button>

    </section>

  </div>

  <!-- BOOKING POPUP -->

  <div id="popup" class="popup hidden">

    <div class="popup-card">

      <div class="popup-header">
        <span id="selectedTime">06:05</span>
      </div>

<form id="bookingForm">

  <!-- ROW 1 -->

  <div class="form-row">

    <div class="form-group">

      <label>
        お名前
      </label>

      <div class="sub-note">
        カタカナ
      </div>

      <input
        type="text"
        placeholder="Name"
        required
      >

    </div>

    <div class="form-group small-group">

      <label>
        部屋番号
      </label>

      <div class="sub-note">
        ご宿泊中のお客様
      </div>

      <input
        type="text"
        placeholder="Room"
      >

    </div>

    <div class="form-group">

      <label>
        チェックイン
      </label>
      <div class="sub-note">
        日付
      </div>


      <input
        type="date"
        required
      >

    </div>

  </div>

  <!-- ROW 2 -->

  <div class="form-row">

    <div class="form-group">

      <label>
        電話番号
      </label>

      <input
        type="text"
        placeholder="Phone Number"
        required
      >

    </div>

  </div>

  <!-- PASSENGER -->

  <div class="group-title">
    ご利用人数
  </div>

  <div class="compact-row">

    <div class="compact-item">

      <span>大人</span>

      <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
      </select>

    </div>

    <div class="compact-item">

      <span>座席あり</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

    <div class="compact-item">

      <span>膝上</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

  </div>

  <!-- LUGGAGE -->

  <div class="group-title">
    荷物
  </div>

  <div class="compact-row">

    <div class="compact-item">

      <span>大型</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>

    </div>

    <div class="compact-item">

      <span>機内持込</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>

    </div>

    <div class="compact-item">

      <span>特大( ベビーカー/ゴルフバック ）</span>

      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
      </select>

    </div>

  </div>

  <!-- BUTTON -->

  <div class="button-row">

    <button
      type="submit"
      class="action-btn"
    >
      確認
    </button>

    <button
      type="button"
      id="closePopup"
      class="action-btn"
    >
    閉じる
    </button>

  </div>

</form>
  </div>

  </div>
<!-- CONFIRM POPUP -->

<div id="confirmPopup" class="popup hidden">

  <div class="popup-card small-popup">

    <div class="popup-header">
      内容確認
    </div>

    <div id="confirmContent"></div>

    <div class="button-row">

      <button
        type="button"
        id="finalConfirmBtn"
        class="action-btn"
      >
        予約確定
      </button>

      <button
        type="button"
        id="backEditBtn"
        class="action-btn"
      >
        修正する
      </button>

    </div>

  </div>

</div>
  <!-- MANAGE POPUP -->

  <div id="managePopup" class="popup hidden">

    <div class="popup-card small-popup">

      <div class="popup-header">
        予約確認
      </div>

      <form id="manageForm">

        <label>お名前</label>
        <input type="text" required>

        <label>電話番号</label>
        <input type="text" required>

        <label>チェックイン日</label>
        <input type="date" required>

        <button type="submit" class="confirm-btn">
          検索
        </button>

        <button type="button" id="closeManagePopup" class="close-btn">
          閉じる
        </button>

      </form>

    </div>

  </div>
<!-- SEARCH RESULT -->

<div id="resultPopup" class="popup hidden">

  <div class="popup-card small-popup">

    <div class="popup-header">
      ご予約内容
    </div>

    <div id="resultContent"></div>

    <div class="button-row">

      <button
        type="button"
        id="openEditBtn"
        class="action-btn"
      >
        修正する
      </button>

      <button
        type="button"
        id="cancelBookingBtn"
        class="action-btn delete-btn"
      >
        キャンセルする
      </button>

      <button
        type="button"
        id="closeResultPopup"
        class="action-btn"
      >
        閉じる
      </button>

    </div>

  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <script src="./app.js"></script>

</body>
</html>
