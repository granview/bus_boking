<!DOCTYPE html>

<body>

<button id="hotelStopBtn" class="stop-btn">

            <div class="info-panel">

    <div id="reservePopup" class="popup hidden">
        <div class="popup-box clear-popup">
            <div class="popup-time-row">
                <label class="time-label">予約時間</label>

                <select id="bookingTime" class="time-select">
                    <!-- Early -->
                    <option value="06:05">06:05</option>
                    <option value="06:20">06:20</option>
                    <option value="06:40">06:40</option>
                    <option value="07:00">07:00</option>

                    <!-- Late -->
                    <option value="07:30">07:30</option>
                    <option value="08:00">08:00</option>
                    <option value="08:30">08:30</option>
                    <option value="09:00">09:00</option>
                    <option value="09:30">09:30</option>
                    <option value="10:00">10:00</option>
                </select>
                <div id="timePreview" class="time-change-wrap"></div>
            </div>

            <form id="reserveForm">
                <div class="popup-body clear-body">

                    <div class="popup-panel-segment">
                        <div class="form-inline-row">
                            <div class="form-group size-room">
                                <label class="field-label">部屋番号</label>
                                <input id="inputRoom" type="text" lang="ja" inputmode="kana" autocomplete="off"
                                    autocapitalize="off">
                            </div>
                            <div class="form-group size-name">
                                <label class="field-label">お名前</label>
                                <input id="inputName" type="text" lang="ja" inputmode="kana" autocomplete="off"
                                    autocapitalize="off">
                            </div>
                            <div class="form-group size-stay">
                                <label class="field-label">ステイ</label>
                                <button type="button" class="stay-toggle-btn" id="stayToggle">OFF</button>
                            </div>
                        </div>

                        <div class="form-inline-row flex-align-start"
                            style="margin-top: 12px; border-top: 1px dashed #e5e7eb;">
                            <div class="form-group size-adult-counter">
                                <label class="field-label highlight-label">大人 (名)</label>
                                <div class="stepper-input adult-stepper">
                                    <button type="button" class="step-btn minus">&#8722;</button>
                                    <input type="number" value="0" min="0" max="20" id="selAdults">
                                    <button type="button" class="step-btn plus">&#43;</button>
                                </div>
                            </div>
                            <div class="form-group size-infant-counter">
                                <label class="field-label infant-label">添い寝 (名)</label>
                                <div class="stepper-input infant-stepper">
                                    <button type="button" class="step-btn minus">&#8722;</button>
                                    <input type="number" value="0" min="0" max="10" id="selSoinet">
                                    <button type="button" class="step-btn plus">&#43;</button>
                                </div>
                            </div>
                            <div class="form-group size-seat-toggle">
                                <label class="field-label infant-label">添い寝座席</label>
                                <div class="seat-toggle-compact">
                                    <button type="button" class="seat-btn-compact" id="btnSeatAri">あり</button>
                                    <button type="button" class="seat-btn-compact" id="btnSeatNashi">なし</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="popup-panel-segment luggage-separated-segment">
                        <div class="luggage-compact-grid">
                            <div class="lug-compact-item">
                                <span class="lug-label-text">特大</span>
                                <div class="stepper-input minified">
                                    <button type="button" class="step-btn minus">&#8722;</button>
                                    <input type="number" value="0" min="0" max="10" id="lugTokudai">
                                    <button type="button" class="step-btn plus">&#43;</button>
                                </div>
                            </div>
                            <div class="lug-compact-item">
                                <span class="lug-label-text">大</span>
                                <div class="stepper-input minified">

                            </div>
                            <div class="lug-compact-item">

                                    <button type="button" class="step-btn minus">&#8722;</button>
                                    <input type="number" value="0" min="0" max="10" id="lugMedium">
                                    <button type="button" class="step-btn plus">&#43;</button>
                                </div>
                            </div>
                            <div class="lug-compact-item">
                                <span class="lug-label-text">小</span>
                                <div class="stepper-input minified">
                                    <button type="button" class="step-btn minus">&#8722;</button>
                                    <input type="number" value="0" min="0" max="10" id="lugSmall">
                                    <button type="button" class="step-btn plus">&#43;</button>
                                </div>
                            </div>
                        </div>
                        <div class="group-section">

                            <label>グループ選択</label>
                            <select id="groupIcon">
                                <option value="">なし</option>

                                <option value="●">● </option>
                                <option value="○">○ </option>

                                <option value="■">■ </option>
                                <option value="□">□</option>

                                <option value="▲">▲ </option>
                                <option value="△">△ </option>

                                <option value="◆">◆ </option>
                                <option value="◇">◇ </option>

                                <option value="★">★</option>
                                <option value="☆">☆</option>
                            </select>

                            <label>選択済み</label>
                            <select id="existingGroupsSelect">
                                <option value="">選択...</option>
                            </select>

                        </div>
                        <div class="form-group" style="margin-top: 14px;">
                            <label class="field-label">備考・その他の荷物</label>
                            <div class="note-suggestions">
                                <button type="button" class="note-chip" data-value="なし">なし</button>
                                <button type="button" class="note-chip" data-value="手荷物">手荷物</button>
                                <button type="button" class="note-chip" data-value="リユック">リユック</button>
                                <button type="button" class="note-chip" data-value="ゴルフバッグ">ゴルフバッグ</button>
                                <button type="button" class="note-chip" data-value="ベビーカー">ベビーカー</button>
                            </div>
                            <input type="text" id="inputNote">
                        </div>
                    </div>

                </div>
                <div class="popup-btn-row">
                    <button type="submit" class="save-btn">保存する</button>
                    <button type="button" id="deleteBtn" class="delete-btn">削除</button>
                    <button type="button" id="closePopup" class="close-btn">閉じる</button>
                </div>
            </form>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/default.css">

    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/index.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/scroll-behaviour.min.js"></script>

    <script>
        window.addEventListener("load", function () {

            if (window.MobileDragDrop) {

                MobileDragDrop.polyfill({
                    dragImageTranslateOverride:
                        MobileDragDrop.scrollBehaviourDragImageTranslateOverride
                });

            }

        });
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script src="./admin.js"></script>
    <div id="toastContainer"></div>
    <script>
        document.addEventListener('click', function(e) {
            const chip = e.target.closest('.note-chip');
            if (!chip) return;
            const inputNote = document.getElementById('inputNote');
            if (!inputNote) return;

            const val = chip.dataset.value;
            chip.classList.toggle('active');

            // Thu thập tất cả chip đang active
            const activeChips = Array.from(document.querySelectorAll('.note-chip.active'))
                .map(c => c.dataset.value);

            inputNote.value = activeChips.join('・');
        });

        // Reset chip states khi popup mở (gọi từ admin.js nếu cần)
        function resetNoteChips() {
            document.querySelectorAll('.note-chip').forEach(c => c.classList.remove('active'));
        }
    </script>
