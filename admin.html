<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Shuttle Bus Admin
  </title>

  <link
    rel="stylesheet"
    href="./admin.css"
  >

</head>

<body>

  <div class="admin-container">

    <!-- HEADER -->

    <h1 class="main-title">
      送迎バス
    </h1>

    <!-- TOP CONTROL -->

    <section class="top-control">

  <!-- PREV DAY -->
  <button
    type="button"
    class="date-arrow"
    id="prevDateBtn"
  >
    ◀
  </button>

  <!-- DATE -->
  <div class="date-box">

    <input
      type="date"
      id="adminDate"
    >

  </div>

  <!-- NEXT DAY -->
  <button
    type="button"
    class="date-arrow"
    id="nextDateBtn"
  >
    ▶
  </button>

</section>

    <!-- SEARCH -->

    <section class="search-area">

      <input
        type="date"
        id="searchDate"
      >

      <input
        type="text"
        id="searchRoom"
        placeholder="部屋番号"
      >

      <input
        type="text"
        id="searchName"
        placeholder="名前"
      >

      <button id="searchBtn">
        検索
      </button>

      <button id="clearSearchBtn">
        ×
      </button>

    </section>

    <div id="searchResult"></div>

    <!-- MAIN -->

    <div class="admin-wrapper">

      <!-- MORNING -->

      <section class="admin-section">

        <div class="admin-title">
          6:05 - 7:00
        </div>

        <div class="admin-subtitle">
          最大15名（8名車優先）
        </div>

        <table class="admin-table">

          <thead>

            <tr>

              <th class="time-col">
                時間
              </th>

              <th>
                8名車
              </th>

              <th>
                7名車
              </th>

            </tr>

          </thead>

          <tbody>

            <!-- 06:05 -->

            <tr>

              <td class="time-cell">
                06:05
              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:05"
                  data-car="8名車"
                >
                  ＋予約
                </button>

              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:05"
                  data-car="7名車"
                >
                  ＋予約
                </button>

              </td>

            </tr>

            <!-- 06:20 -->

            <tr>

              <td class="time-cell">
                06:20
              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:20"
                  data-car="8名車"
                >
                  ＋予約
                </button>

              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:20"
                  data-car="7名車"
                >
                  ＋予約
                </button>

              </td>

            </tr>

            <!-- 06:40 -->

            <tr>

              <td class="time-cell">
                06:40
              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:40"
                  data-car="8名車"
                >
                  ＋予約
                </button>

              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="06:40"
                  data-car="7名車"
                >
                  ＋予約
                </button>

              </td>

            </tr>

            <!-- 07:00 -->

            <tr>

              <td class="time-cell">
                07:00
              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="07:00"
                  data-car="8名車"
                >
                  ＋予約
                </button>

              </td>

              <td>

                <div class="guest-row"></div>

                <div class="empty-text">
                  空きあり
                </div>

                <button
                  class="reserve-btn"
                  data-time="07:00"
                  data-car="7名車"
                >
                  ＋予約
                </button>

              </td>

            </tr>

          </tbody>

        </table>

      </section>

      <!-- SHUTTLE -->

      <section class="admin-section">

        <div class="admin-title">
          7:30 - 10:00
        </div>

        <div class="admin-subtitle">
          最大7名
        </div>

        <div class="regular-wrapper">

          <!-- LEFT -->

          <table class="admin-table">

            <thead>

              <tr>

                <th class="time-col">
                  時間
                </th>

                <th>
                  Shuttle
                </th>

              </tr>

            </thead>

            <tbody>

              <!-- 07:30 -->

              <tr>

                <td class="time-cell">
                  07:30
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="07:30"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

              <!-- 08:00 -->

              <tr>

                <td class="time-cell">
                  08:00
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="08:00"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

              <!-- 08:30 -->

              <tr>

                <td class="time-cell">
                  08:30
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="08:30"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

            </tbody>

          </table>

          <!-- RIGHT -->

          <table class="admin-table">

            <thead>

              <tr>

                <th class="time-col">
                  時間
                </th>

                <th>
                  Shuttle
                </th>

              </tr>

            </thead>

            <tbody>

              <!-- 09:00 -->

              <tr>

                <td class="time-cell">
                  09:00
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="09:00"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

              <!-- 09:30 -->

              <tr>

                <td class="time-cell">
                  09:30
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="09:30"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

              <!-- 10:00 -->

              <tr>

                <td class="time-cell">
                  10:00
                </td>

                <td>

                  <div class="guest-row"></div>

                  <div class="empty-text">
                    空きあり
                  </div>

                  <button
                    class="reserve-btn"
                    data-time="10:00"
                    data-car="Shuttle"
                  >
                    ＋予約
                  </button>

                </td>

              </tr>

            </tbody>

          </table>

        </div>

        <!-- EXPORT -->

        <div class="excel-area">

          <button id="exportExcelBtn">
            Excel出力
          </button>

        </div>

      </section>

    </div>

  </div>

  <!-- POPUP -->

  <div
    id="reservePopup"
    class="popup hidden"
  >

    <div class="popup-box">

      <div class="popup-title">
        予約登録
      </div>

      <div
        class="popup-time"
        id="popupTime"
      ></div>

      <form id="reserveForm">

        <!-- ROOM + NAME -->

        <div class="form-row">

          <input
            type="number"
            placeholder="部屋番号"
            required
          >

          <input
            type="text"
            placeholder="お名前"
          >

        </div>

        <!-- PHONE -->

        <div class="form-row">

          <input
            type="number"
            placeholder="電話番号"
          >

        </div>

        <!-- PEOPLE -->

        <div class="mini-title">
          ご利用人数
        </div>

        <div class="count-row">

          <!-- ADULT -->

          <div class="count-box">

            <span>
              大人
            </span>

            <select>

              <option>0</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>

            </select>

          </div>

          <!-- CHILD -->

          <div class="count-box">

            <span>
              膝上
            </span>

            <select>

              <option>0</option>
              <option>1</option>
              <option>2</option>

            </select>

          </div>

        </div>

        <!-- LUGGAGE -->

        <div class="mini-title">
          荷物
        </div>

        <!-- STAY -->

        <div class="stay-row">

          <label class="stay-label">

            <input
              type="checkbox"
              id="stayCheck"
            >

            ステイ

          </label>

        </div>

        <div class="count-row luggage-row">

          <!-- LARGE -->

          <div class="count-box">

            <span>
              大
            </span>

            <select class="luggage-select">

              <option>0</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>

            </select>

          </div>

          <!-- MEDIUM -->

          <div class="count-box">

            <span>
              中
            </span>

            <select class="luggage-select">

              <option>0</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>

            </select>

          </div>

          <!-- STROLLER -->

          <div class="count-box">

            <span>
              ベビーカー
            </span>

            <select class="luggage-select">

              <option>0</option>
              <option>1</option>
              <option>2</option>

            </select>

          </div>

        </div>

        <!-- BUTTON -->

        <div class="popup-btn-row">

          <button
            type="submit"
            class="save-btn"
          >
            保存
          </button>

          <button
            type="button"
            id="deleteBtn"
            class="delete-btn"
          >
            削除
          </button>

          <button
            type="button"
            id="closePopup"
            class="close-btn"
          >
            閉じる
          </button>

        </div>

      </form>

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

<script src="admin.js"></script>

</body>

</html>
